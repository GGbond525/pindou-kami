<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>拼小豆</title>
<link rel="stylesheet" crossorigin href="https://op-sourcecode.cdn.bcebos.com/source_code/projects/conv-cmg2zac479j4_1784219417188/assets/index-B-8XW312.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#FFF8F8;min-height:100vh}
.pg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;display:none;align-items:center;justify-content:center;background:linear-gradient(135deg,#8B0000,#4A0000)}
.pg.show{display:flex}
.bx{background:#fff;border-radius:16px;padding:32px;width:420px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.bx h1{color:#8B0000;font-size:24px;margin-bottom:4px}
.bx .sb{color:#888;font-size:13px;margin-bottom:16px}
.bx input{width:100%;padding:11px 14px;border:2px solid #E8D5D5;border-radius:8px;font-size:15px;outline:none;margin-bottom:10px}
.bx input:focus{border-color:#8B0000}
.bx .btn{width:100%;padding:11px;background:#8B0000;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-bottom:8px}
.bx .btn:hover{background:#CC0000}.bx .btn:disabled{background:#ccc;cursor:not-allowed}
.bx .msg{margin:8px 0;font-size:14px;min-height:22px}.ok{color:#28a745}.er{color:#dc3545}
.bx .lk{color:#888;font-size:13px;margin-top:12px}.bx .lk a{color:#D4A017;font-weight:bold;cursor:pointer}
.tg{display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:bold}
.tgg{background:#e8f5e9;color:#2e7d32}.tgo{background:#fff8e1;color:#f57f17}.tgg2{background:#f5f5f5;color:#888}
#adm-pg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:99998;display:none;background:#FFF8F8;overflow-y:auto;padding:16px}
#adm-pg.show{display:block}
.wa{max-width:960px;margin:0 auto;background:#fff;border-radius:12px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.wa h2{color:#8B0000;margin-bottom:12px;font-size:20px}
.wa table{width:100%;border-collapse:collapse;font-size:12.5px}
.wa td,.wa th{padding:5px 6px;border-bottom:1px solid #eee;text-align:left}
.wa th{background:#f5f5f5;position:sticky;top:0;font-weight:600}
.tls{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap;align-items:center}
.tls button{padding:7px 14px;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12.5px}
.tls .rd{background:#8B0000}.tls .gd{background:#D4A017;color:#333}.tls .gy{background:#666}
.st{display:flex;gap:10px;margin:8px 0;font-size:12.5px;flex-wrap:wrap}
.st span{background:#f5f5f5;padding:4px 10px;border-radius:4px}
.tb{display:flex;gap:0;margin:8px 0;border-bottom:1px solid #eee}
.tb span{padding:6px 16px;cursor:pointer;border-bottom:2px solid transparent;font-size:13px}
.tb .on{border-bottom-color:#8B0000;color:#8B0000;font-weight:bold}
.kc{font-family:monospace;font-size:15px;letter-spacing:2px;color:#8B0000;font-weight:bold;cursor:pointer;padding:5px;background:#fff8f8;border-radius:4px;display:inline-block}
#ag-pg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:99997;display:none;background:#FFF8F8;overflow-y:auto;padding:16px}
#ag-pg.show{display:block}
.abx{max-width:700px;margin:0 auto}
.ahd{background:linear-gradient(135deg,#D4A017,#f57f17);color:#fff;padding:20px;border-radius:12px 12px 0 0}
.abd{background:#fff;padding:20px;border-radius:0 0 12px 12px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.abd .sr{display:flex;gap:12px;margin:10px 0;flex-wrap:wrap}
.abd .sr span{background:#f5f5f5;padding:6px 14px;border-radius:6px;font-size:14px}
.abd .sr .nm{font-size:22px;font-weight:bold;color:#8B0000}
.gp{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:24px;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.3);z-index:99999;max-width:90vw;max-height:80vh;overflow-y:auto;min-width:320px}
.gp h3{color:#8B0000;margin-bottom:10px}
.gp .cr{display:flex;align-items:center;gap:8px;padding:5px 8px;background:#f9f5f5;border-radius:6px;margin-bottom:3px}
.gp .cr .ct{font-family:monospace;font-size:14px;letter-spacing:2px;flex:1;color:#8B0000;font-weight:bold}
.cp{display:inline-flex;padding:3px 10px;border:1px solid #8B0000;background:#fff;color:#8B0000;border-radius:4px;cursor:pointer;font-size:12px}
.cp:hover{background:#8B0000;color:#fff}.cp.done{background:#28a745;color:#fff;border-color:#28a745}
.gp .cb2{width:100%;padding:10px;background:#8B0000;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-top:8px}
#app-r{display:none}#app-r.show{display:block}
.tb2{position:fixed;top:0;left:0;right:0;z-index:99997;background:#8B0000;color:#fff;text-align:center;padding:4px 8px;font-size:12px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.tb2 a{color:#D4A017;text-decoration:none;font-weight:bold;cursor:pointer}
body{padding-top:26px!important}header{top:26px!important}
.sel{width:100%;padding:10px;border:2px solid #E8D5D5;border-radius:8px;font-size:14px;outline:none;margin-bottom:10px;background:#fff}
.lbl{font-size:13px;color:#666;text-align:left;margin-bottom:3px}
.card-type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.card-type-opt{padding:10px;border:2px solid #E8D5D5;border-radius:8px;cursor:pointer;text-align:center;transition:all .2s;background:#fff}
.card-type-opt:hover{border-color:#D4A017}
.card-type-opt.sel{border-color:#8B0000;background:#fff0f0}
.card-type-opt .ico{font-size:24px;margin-bottom:4px}
.card-type-opt .nm2{font-size:14px;font-weight:bold;color:#333}
.card-type-opt .ds{font-size:11px;color:#888;margin-top:2px}
</style></head>
<body>

<div class="pg show" id="pg-r">
<div class="bx"><h1>拼小豆</h1><div class="sb">注册账号</div>
<input type="text" id="r_u" placeholder="用户名"><input type="password" id="r_p" placeholder="密码（至少6位）">
<button class="btn" id="r_b" onclick="rg()">注册</button><div class="msg" id="r_m"></div>
<div class="lk">已有账号？<a onclick="shL()">去登录</a></div></div></div>

<div class="pg" id="pg-l">
<div class="bx"><h1>拼小豆</h1><div class="sb">登录账号</div>
<input type="text" id="l_u" placeholder="用户名"><input type="password" id="l_p" placeholder="密码">
<button class="btn" id="l_b" onclick="li()">登录</button><div class="msg" id="l_m"></div>
<div class="lk">没有账号？<a onclick="shR()">去注册</a></div></div></div>

<div class="pg" id="pg-h">
<div class="bx"><h1>拼小豆</h1><div class="sb" id="hw">欢迎！</div>
<button class="btn" onclick="shA()">激活会员卡密</button>
<div class="lk" style="margin-top:14px"><a onclick="adS()" style="color:#888">管理后台</a></div></div></div>

<div class="pg" id="pg-a">
<div class="bx"><h1>激活会员</h1><div class="sb">请输入16位卡密</div>
<input type="text" id="a_kc" maxlength="16" placeholder="16位卡密" oninput="this.value=this.value.toUpperCase()">
<button class="btn" id="a_b" onclick="ac()">激活</button><div class="msg" id="a_m"></div>
<div class="lk"><a onclick="bTA()">返回</a></div></div></div>

<div class="pg" id="pg-aa">
<div class="bx"><h1>升级代理</h1><div class="sb">请输入12位代理卡密</div>
<input type="text" id="aa_kc" maxlength="12" placeholder="12位代理卡密" oninput="this.value=this.value.toUpperCase()">
<input type="text" id="aa_wx" placeholder="微信号"><button class="btn" id="aa_b" onclick="aa()" style="background:#D4A017;color:#333">升级代理</button>
<div class="msg" id="aa_m"></div><div class="lk"><a onclick="bTA()">返回</a></div></div></div>

<div id="ag-pg">
<div class="abx"><div class="ahd"><h2>代理后台</h2><p style="opacity:.9;font-size:13px">生成会员卡密</p>
<a onclick="gB()" style="color:#fff;text-decoration:underline;cursor:pointer;font-size:12px">← 返回</a></div>
<div class="abd">
<div id="ag_d" style="display:none">
<div class="sr" id="ag_s"></div>
<div class="tls"><button class="gd" onclick="agG(1)">1张</button><button class="gd" onclick="agG(5)">5张</button><button class="gd" onclick="agG(10)">10张</button>
<button class="gy" onclick="agR()">刷新</button></div>
<div style="max-height:300px;overflow-y:auto"><table><thead><tr><th>卡密(16位永久)</th><th>状态</th><th>生成时间</th></tr></thead>
<tbody id="ag_l"></tbody></table></div></div>
<div id="ag_n" style="padding:20px;text-align:center;color:#888">未激活代理卡密</div></div></div></div>

<div id="adm-pg">
<div class="wa"><h2>卡密管理 <span style="font-size:12px;color:#888;font-weight:normal">密码: WzS18350168663.</span></h2>
<div style="display:flex;gap:6px;margin:8px 0"><input type="password" id="ad_pw" placeholder="管理密码" style="padding:7px 10px;border:2px solid #E8D5D5;border-radius:6px;font-size:13px;flex:1">
<button onclick="adL()" style="padding:7px 16px;background:#8B0000;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">登录</button>
<button onclick="document.getElementById('adm-pg').classList.remove('show');bTA()" style="padding:7px 12px;background:#666;color:#fff;border:none;border-radius:6px;cursor:pointer">返回</button></div>
<div id="ad_pn" style="display:none">
<div class="st" id="ad_st"></div>
<div class="tb" id="ad_tb1">
<span class="on" onclick="swTB(this,'member')">会员卡密</span>
<span onclick="swTB(this,'agent')">代理卡密</span>
<span onclick="swTB(this,'all')">全部</span></div>
<div class="tls" id="ad_btns">
  <span style="font-size:12px;color:#888;margin-right:4px">生成:</span>
  <!-- 会员卡密类型 -->
  <span id="gen_m_btns">
    <button class="rd" onclick="adG(1,'m_1d')">1天线</button>
    <button class="rd" onclick="adG(1,'m_7d')">7天线</button>
    <button class="rd" onclick="adG(1,'m_perm')">永久</button>
    <button class="gd" onclick="adG(5,'m_1d')">×5</button>
    <button class="gd" onclick="adG(5,'m_7d')">×5</button>
    <button class="gd" onclick="adG(5,'m_perm')">×5</button>
  </span>
  <!-- 代理卡密类型 -->
  <span id="gen_a_btns" style="display:none">
    <button class="rd" onclick="adG(1,'a_1d')">1天(配额10)</button>
    <button class="rd" onclick="adG(1,'a_7d')">7天(配额50)</button>
    <button class="rd" onclick="adG(1,'a_perm')">永久(配额999)</button>
    <button class="gd" onclick="adG(5,'a_1d')">×5</button>
    <button class="gd" onclick="adG(5,'a_7d')">×5</button>
    <button class="gd" onclick="adG(5,'a_perm')">×5</button>
  </span>
  <button class="gy" onclick="adR()">刷新</button>
  <button class="gy" onclick="shUs()">用户</button>
</div>
<div class="tb" id="ad_tb2"><span class="on" onclick="swTB2(this,'unused')">未使用</span><span onclick="swTB2(this,'used')">已使用</span></div>
<div style="max-height:350px;overflow-y:auto"><table><thead><tr><th>卡密</th><th>类型</th><th>状态</th><th>生成时间</th><th>来源/使用</th><th>使用时间</th><th>操作</th></tr></thead>
<tbody id="ad_lb"></tbody></table></div>
<div id="us_lb" style="display:none;margin-top:16px"><h3 style="color:#8B0000;font-size:16px">注册用户</h3>
<table><thead><tr><th>用户名</th><th>注册时间</th><th>会员</th><th>到期</th><th>代理</th><th>配额</th><th>微信</th></tr></thead>
<tbody id="us_tb"></tbody></table></div></div></div></div>

<div id="app-r"><div class="tb2">拼小豆
<a id="btn-up" onclick="shAA()">升级代理</a><a id="btn-ag" onclick="agS()" style="display:none">代理后台</a>
<a onclick="adS()">管理</a><a onclick="lo()">退出</a></div><div id="root"></div></div>

<script>
const B=window.location.origin;let cu='',aT='member',sT='unused';

function shR(){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));document.getElementById('pg-r').classList.add('show')}
function shL(){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));document.getElementById('pg-l').classList.add('show')}
function shH(){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));document.getElementById('pg-h').classList.add('show')}
function shA(){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));document.getElementById('pg-a').classList.add('show');document.getElementById('a_m').textContent=''}
function shAA(){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));document.getElementById('app-r').classList.remove('show');document.getElementById('pg-aa').classList.add('show');document.getElementById('aa_m').textContent=''}

async function rg(){
  const u=document.getElementById('r_u').value.trim(),p=document.getElementById('r_p').value,m=document.getElementById('r_m'),b=document.getElementById('r_b');
  if(!u||!p){m.className='msg er';m.textContent='请填写完整';return}
  if(p.length<6){m.className='msg er';m.textContent='密码至少6位';return}
  b.disabled=1;b.textContent='注册中...';
  try{const r=await fetch(B+'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d=await r.json();
  if(d.s){m.className='msg ok';m.textContent='注册成功';setTimeout(shL,500)}
  else{m.className='msg er';m.textContent=d.m;b.disabled=0;b.textContent='注册'}
  }catch(e){m.className='msg er';m.textContent='网络错误';b.disabled=0;b.textContent='注册'}
}

async function li(){
  const u=document.getElementById('l_u').value.trim(),p=document.getElementById('l_p').value,m=document.getElementById('l_m'),b=document.getElementById('l_b');
  if(!u||!p){m.className='msg er';m.textContent='请填写完整';return}
  b.disabled=1;b.textContent='登录中...';
  try{
    const r=await fetch(B+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.s){
      cu=u;localStorage.setItem('kami_user',u);
      if(d.ia)localStorage.setItem('kami_agent','1');
      const r2=await fetch(B+'/api/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u})});
      const d2=await r2.json();
      if(d2.act){localStorage.setItem('kami_ok','1');stA();}
      else{document.getElementById('hw').textContent='欢迎，'+u;shH()}
    }else{m.className='msg er';m.textContent=d.m;b.disabled=0;b.textContent='登录'}
  }catch(e){m.className='msg er';m.textContent='网络错误';b.disabled=0;b.textContent='登录'}
}

async function ac(){
  const c=document.getElementById('a_kc').value.trim(),m=document.getElementById('a_m'),b=document.getElementById('a_b');
  if(c.length<16){m.className='msg er';m.textContent='请输入16位卡密';return}
  b.disabled=1;b.textContent='验证中...';
  try{
    const r=await fetch(B+'/api/activate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:cu,code:c})});
    const d=await r.json();
    if(d.s){m.className='msg ok';m.textContent=d.m;localStorage.setItem('kami_ok','1');
      try{const wx=await fetch(B+'/api/get_wx',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:c})});
      const wd=await wx.json();if(wd.s)m.textContent+=' 客服微信:'+wd.wi}catch(e){}
      setTimeout(stA,2000);
    }else{m.className='msg er';m.textContent=d.m;b.disabled=0;b.textContent='激活'}
  }catch(e){m.className='msg er';m.textContent='网络错误';b.disabled=0;b.textContent='激活'}
}

async function aa(){
  const c=document.getElementById('aa_kc').value.trim(),w=document.getElementById('aa_wx').value.trim(),m=document.getElementById('aa_m'),b=document.getElementById('aa_b');
  if(c.length<12){m.className='msg er';m.textContent='输入12位代理卡密';return}
  if(!w){m.className='msg er';m.textContent='输入微信号';return}
  b.disabled=1;b.textContent='升级中...';
  try{
    const r=await fetch(B+'/api/activate_agent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:cu,code:c,wechat_id:w})});
    const d=await r.json();
    if(d.s){m.className='msg ok';m.textContent='升级代理成功！配额'+d.aq;localStorage.setItem('kami_agent','1');
      updateTB();setTimeout(()=>agS(),1000);
    }else{m.className='msg er';m.textContent=d.m;b.disabled=0;b.textContent='升级代理'}
  }catch(e){m.className='msg er';m.textContent='网络错误';b.disabled=0;b.textContent='升级代理'}
}

function updateTB(){
  const ia=localStorage.getItem('kami_agent');
  document.getElementById('btn-up').style.display=ia?'none':'';
  document.getElementById('btn-ag').style.display=ia?'':'none';
}

function bTA(){
  if(localStorage.getItem('kami_ok')){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));document.getElementById('app-r').classList.add('show')}
  else shH()
}

function gB(){
  document.getElementById('ag-pg').classList.remove('show');
  document.getElementById('app-r').classList.add('show');
}

// 启动App
function stA(){
  updateTB();
  let bh=false;
  window.addEventListener('popstate',function(e){if(document.getElementById('app-r')?.classList.contains('show')){history.pushState({a:1},'')}});
  history.pushState({a:1},'');
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));
  document.getElementById('app-r').classList.add('show');
  const of=window.fetch;window.fetch=function(){return of.apply(this,arguments).then(async r=>{
    const u=(typeof arguments[0]==='string'?arguments[0]:arguments[0]?.url)||'',ct=r.headers?.get?.('content-type')||'';
    if(!ct.includes('json'))return r;
    try{const j=JSON.parse(await r.clone().text());
      if(u.includes('profiles')){(Array.isArray(j)?j:[j]).forEach(x=>{if(x&&typeof x==='object'){x.role='member';x.member_expires_at='2099-12-31T23:59:59Z';x.agent_quota=999}});return new Response(JSON.stringify(j),{status:200,headers:{'content-type':'application/json'}});}
      if(u.includes('activate-card')||u.includes('functions')){return new Response(JSON.stringify({success:true}),{status:200,headers:{'content-type':'application/json'}});}
      return new Response(JSON.stringify(j),{status:r.status,headers:r.headers});
    }catch(e){return r;}
  })};
  const s=document.createElement('script');s.type='module';s.crossOrigin='';s.src='https://op-sourcecode.cdn.bcebos.com/source_code/projects/conv-cmg2zac479j4_1784219417188/assets/index-BUyD1zWX.js';
  document.getElementById('root').after(s);
}

function lo(){
  localStorage.removeItem('kami_ok');localStorage.removeItem('kami_agent');localStorage.removeItem('kami_user');
  cu='';document.getElementById('app-r').classList.remove('show');document.getElementById('adm-pg').classList.remove('show');
  document.getElementById('ag-pg').classList.remove('show');shL()
}

// ===== 代理后台 =====
async function agS(){
  if(localStorage.getItem('kami_agent')){
    document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));
    document.getElementById('app-r').classList.remove('show');
    document.getElementById('ag-pg').classList.add('show');
    document.getElementById('ag_n').style.display='none';document.getElementById('ag_d').style.display='block';
    agR();return;
  }
  const r=await fetch(B+'/api/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:cu})});
  const d=await r.json();
  if(!d.ia){alert('您不是代理，请升级代理');return}
  localStorage.setItem('kami_agent','1');
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));
  document.getElementById('app-r').classList.remove('show');
  document.getElementById('ag-pg').classList.add('show');
  document.getElementById('ag_n').style.display='none';document.getElementById('ag_d').style.display='block';
  agR();
}

async function agR(){
  try{
    const r=await fetch(B+'/api/agent/info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:cu})});
    const d=await r.json();
    if(d.s)document.getElementById('ag_s').innerHTML='<span>配额: <span class="nm">'+d.qa+'</span></span><span>已生成: <span class="nm">'+d.ud+'</span></span><span>剩余: <span class="nm">'+d.rm+'</span></span>';
  }catch(e){}
  try{
    const r2=await fetch(B+'/api/agent/list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:cu,t:'all'})});
    const d2=await r2.json();
    if(d2.s)document.getElementById('ag_l').innerHTML=d2.cs.map(c=>'<tr><td><span class="kc" onclick="navigator.clipboard.writeText(\''+c.cd+'\');this.textContent=\'已复制\'" onmouseleave="this.textContent=\''+c.cd+'\'">'+c.cd+'</span></td><td>'+(c.st=='unused'?'<span class="tg tgg">未使用</span>':'<span class="tg tgg2">已使用</span>')+'</td><td>'+(c.ca||'-')+'</td></tr>').join('');
  }catch(e){}
}

async function agG(n){
  const r=await fetch(B+'/api/agent/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:cu,count:n})});

function adR(){
  fetch(B+'/api/admin/list?pw='+document.getElementById('ad_pw').value+'&t='+sT+'&tp='+aT)
  .then(r=>r.json()).then(d=>{
    if(!d.s)return;
    const labels={'m_1d':'<span class="tg tgg">1天</span>','m_7d':'<span class="tg tgo">7天</span>','m_perm':'<span class="tg tgg">永久</span>',
      'a_1d':'<span class="tg tgo">代1天</span>','a_7d':'<span class="tg tgo">代7天</span>','a_perm':'<span class="tg tgo">代永久</span>'};
    document.getElementById('ad_lb').innerHTML=d.cs.map(c=>{
      const lb=labels[c.cd]||c.cd;
      return '<tr><td><span class="kc" onclick="navigator.clipboard.writeText(\''+c.cd+'\');this.textContent=\'已复制\'" onmouseleave="this.textContent=\''+c.cd+'\'">'+c.cd+'</span></td><td>'+lb+'</td><td>'+(c.st=='unused'?'<span class="tg tgg">未使用</span>':'<span class="tg tgg2">已使用</span>')+'</td><td>'+(c.ca||'-')+'</td><td>'+(c.cb||'')+'/'+(c.ub||'')+'</td><td>'+(c.ua||'-')+'</td><td>'+(c.st=='unused'?'<button onclick="adD('+c.id+')" style="background:none;border:1px solid #999;color:#999;padding:2px 6px;border-radius:4px;cursor:pointer;font-size:11px">删</button>':'')+'</td></tr>'
    }).join('');

  });
}

function adD(id){
  if(!confirm('确定删除？'))return;

}

function shUs(){
  const ul=document.getElementById('us_lb');
  if(ul.style.display==='none'){
    fetch(B+'/api/admin/users?pw='+document.getElementById('ad_pw').value).then(r=>r.json()).then(d=>{
      if(d.s){
        document.getElementById('us_tb').innerHTML=d.us.map(u=>{
          const mt={'m_1d':'1天','m_7d':'7天','m_perm':'永久'};
          const mtl=mt[u.mt]||'-';

          return '<tr><td>'+u.un+'</td><td>'+(u.ca||'-')+'</td><td>'+(u.kc?mtl:'-')+'</td><td>'+(u.kc?es:'-')+'</td><td>'+(u.ia?'<span class="tg tgo">代理</span>':'<span class="tg tgg2">否</span>')+'</td><td>'+(u.aq||'-')+'</td><td>'+(u.wi||'-')+'</td></tr>'
        }).join('');

}
